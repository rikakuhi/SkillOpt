_base_: ../_base_/default.yaml

model:
  reasoning_effort: medium

train:
  batch_size: 40
  accumulation: 1

gradient:
  minibatch_size: 8
  merge_batch_size: 8

optimizer:
  learning_rate: 4

env:
  name: officeqa
  skill_init: reflact/envs/officeqa/skills/initial.md
  split_dir: data/officeqa_split
  data_dirs:
    - data/officeqa_docs_official
  workers: 4
  max_tool_turns: 24
  limit: 0
