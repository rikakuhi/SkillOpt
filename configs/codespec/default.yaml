# ──────────────────────────────────────────────────
# SkillOpt Config — Codespec Benchmark
# ──────────────────────────────────────────────────
# Usage:
#   python scripts/train.py --config configs/codespec/default.yaml \
#       --cfg-options env.repo_path=/path/to/repo env.gt_path=/path/to/gt.json

_base_: ../_base_/default.yaml

# ── Environment ──────────────────────────────────
env:
  name: codespec
  data_path: data/codespec           # Path to dataset JSON
  split_mode: ratio
  split_ratio: "2:1:7"               # train:val:test
  workers: 2                          # Parallel rollout workers (keep low — each runs a full repo copy + opencode)
  max_completion_tokens: 16384
  limit: 0                            # 0 = no limit; small int for debug

  # ── Codespec-specific ─────────────────────────
  repo_path: ""                       # REQUIRED: path to the original code repository
  gt_path: ""                         # REQUIRED: path to ground truth JSON
  work_dir: ""                        # Working directory for repo copies (default: temp dir)
  opencode_exec: opencode             # Path or name of the opencode CLI executable
  opencode_timeout: 600               # Timeout (seconds) for each codespec invocation
  eval_max_tokens: 4096               # Max completion tokens for LLM judge calls

# ── Training ─────────────────────────────────────
train:
  num_epochs: 4
  batch_size: 10                      # Small batch — each item is expensive
  accumulation: 1
  seed: 42

# ── Gradient (Reflection) ───────────────────────
gradient:
  analyst_workers: 8
  minibatch_size: 4
  merge_batch_size: 4

# ── Optimizer ────────────────────────────────────
optimizer:
  learning_rate: 4                    # Max edits per step (edit budget)
  lr_scheduler: cosine
  use_slow_update: true
  use_meta_skill: true

# ── Evaluation ───────────────────────────────────
evaluation:
  use_gate: true
  eval_test: true

# ── Model ────────────────────────────────────────
model:
  optimizer_backend: openai_chat
  target_backend: openai_chat
  reasoning_effort: medium
